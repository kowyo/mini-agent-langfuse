name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Ruff check
        uses: astral-sh/ruff-action@v4.0.0

      - name: Ruff format
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: "format --check --diff"

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Test
        run: uv run pytest tests/ -v
